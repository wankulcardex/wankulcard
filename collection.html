<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WankulDEX — Ma Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  :root{--red:#E8001D;--yellow:#FFD600;--dark:#0D0D0D;--dark2:#141414;--dark3:#1E1E1E;--card-bg:#1A1A1A;--text:#F5F5F5;--muted:#888;--border:#2A2A2A;--gold:#FFB800;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--dark);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;}

  /* NAV */
  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px;background:rgba(13,13,13,.95);backdrop-filter:blur(12px);border-bottom:2px solid var(--red);}
  .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;color:var(--text);text-decoration:none;}
  .nav-logo span{color:var(--red);}
  .nav-links{display:flex;gap:.5rem;align-items:center;}
  .nav-links a{color:var(--muted);text-decoration:none;font-weight:700;font-size:.85rem;letter-spacing:1px;text-transform:uppercase;padding:.4rem .8rem;border-radius:6px;transition:all .2s;}
  .nav-links a:hover{color:var(--text);background:var(--dark3);}
  .nav-links a.active{color:var(--yellow);}
  .nav-user{display:flex;align-items:center;gap:.75rem;font-size:.85rem;font-weight:700;color:var(--muted);}
  .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1.2rem;border-radius:8px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;cursor:pointer;transition:all .2s;text-decoration:none;border:none;}
  .btn-outline{background:transparent;border:2px solid var(--border);color:var(--text);}
  .btn-outline:hover{border-color:var(--yellow);color:var(--yellow);}
  .btn-primary{background:var(--red);color:white;}
  .btn-primary:hover{background:#c0001a;}

  /* LAYOUT */
  .page{padding:90px 2rem 4rem;max-width:1300px;margin:0 auto;}
  .page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;letter-spacing:2px;}
  .page-title span{color:var(--red);}

  /* STATS BANNER */
  .stats-banner{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;margin-bottom:2rem;}
  .stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:1.25rem;text-align:center;}
  .stat-card-num{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--yellow);line-height:1;}
  .stat-card-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:.25rem;}

  /* FILTERS */
  .filters{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap;}
  .filter-group{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}
  .filter-label{font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;}
  .filter-pill{background:var(--dark3);border:1px solid var(--border);color:var(--muted);border-radius:99px;padding:.35rem .85rem;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;}
  .filter-pill:hover{color:var(--text);}
  .filter-pill.active{background:var(--red);border-color:var(--red);color:white;}
  .filter-sep{width:1px;height:30px;background:var(--border);flex-shrink:0;}
  .search-input{background:var(--dark3);border:1px solid var(--border);border-radius:10px;padding:.5rem 1rem;color:var(--text);font-family:'Nunito',sans-serif;font-size:.875rem;outline:none;transition:border .2s;width:200px;}
  .search-input:focus{border-color:var(--red);}
  .search-input::placeholder{color:var(--muted);}

  /* SORT */
  .sort-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.75rem;}
  .sort-group{display:flex;gap:.5rem;align-items:center;}
  .sort-btn{background:var(--dark3);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.4rem .85rem;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s;}
  .sort-btn:hover{color:var(--text);}
  .sort-btn.active{background:var(--dark2);border-color:var(--yellow);color:var(--yellow);}
  .results-count{font-size:.875rem;color:var(--muted);}
  .view-btns{display:flex;gap:.25rem;}
  .view-btn{background:var(--dark3);border:1px solid var(--border);border-radius:8px;padding:.4rem .7rem;cursor:pointer;color:var(--muted);transition:all .2s;font-size:1rem;}
  .view-btn.active{border-color:var(--yellow);color:var(--yellow);}

  /* GRID */
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;}
  .cards-grid.list-view{grid-template-columns:1fr;}

  /* CARD */
  .coll-card{background:var(--dark3);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all .3s;animation:fadeIn .3s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .coll-card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,.5);}
  .coll-card.foil{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);}
  .coll-card.missing{opacity:.35;filter:grayscale(.8);}

  .card-face{height:140px;display:flex;align-items:center;justify-content:center;font-size:4rem;position:relative;overflow:hidden;}
  .foil-layer{position:absolute;inset:0;background:linear-gradient(105deg,transparent 20%,rgba(255,215,0,.15) 40%,rgba(255,100,200,.15) 50%,rgba(100,200,255,.15) 60%,transparent 80%);animation:foilS 3s ease infinite alternate;}
  @keyframes foilS{from{transform:translateX(-30%)}to{transform:translateX(30%)}}

  .card-body{padding:.875rem;}
  .card-rarity-badge{display:inline-block;padding:.15rem .5rem;border-radius:4px;font-size:.65rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-bottom:.4rem;}
  .card-name{font-weight:900;font-size:.95rem;line-height:1.2;margin-bottom:.2rem;}
  .card-meta{font-size:.75rem;color:var(--muted);display:flex;justify-content:space-between;align-items:center;}
  .qty-badge{background:var(--red);color:white;border-radius:6px;padding:.1rem .4rem;font-size:.7rem;font-weight:900;}
  .foil-tag2{font-size:.65rem;font-weight:900;background:linear-gradient(90deg,#FFD700,#FF69B4,#00BFFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

  /* LIST VIEW */
  .cards-grid.list-view .coll-card{border-radius:10px;}
  .cards-grid.list-view .card-face{height:60px;width:60px;font-size:2rem;flex-shrink:0;border-radius:8px;}
  .cards-grid.list-view .coll-card > *{display:flex;align-items:center;gap:1rem;padding:.75rem 1rem;}
  .cards-grid.list-view .card-body{flex:1;padding:0;}

  /* EMPTY */
  .empty-state{text-align:center;padding:5rem 2rem;color:var(--muted);}
  .empty-state .emoji{font-size:4rem;margin-bottom:1rem;}
  .empty-state h3{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:1px;margin-bottom:.5rem;color:var(--text);}

  /* LOADING */
  .loading{text-align:center;padding:3rem;color:var(--muted);}
  .spinner{display:inline-block;width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:1rem;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* AUTH WALL */
  .auth-wall{text-align:center;padding:4rem 2rem;background:var(--card-bg);border:1px solid var(--border);border-radius:20px;margin-top:2rem;}
  .auth-wall h2{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:1px;margin-bottom:.75rem;}
  .auth-wall p{color:var(--muted);margin-bottom:1.5rem;}

  /* RARITY SECTION HEADERS */
  .rarity-header{display:flex;align-items:center;gap:.75rem;margin:2rem 0 1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);}
  .rarity-header-dot{width:12px;height:12px;border-radius:50%;}
  .rarity-header-name{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:1px;}
  .rarity-header-count{font-size:.8rem;color:var(--muted);font-weight:700;}
  .progress-bar-wrap{flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden;}
  .progress-bar{height:100%;border-radius:99px;transition:width .6s ease;}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Wankul<span>DEX</span></a>
  <div class="nav-links">
    <a href="index.html">Accueil</a>
    <a href="boosters.html">Boosters</a>
    <a href="collection.html" class="active">Ma Collection</a>
  </div>
  <div class="nav-user" id="navUser"></div>
</nav>

<div class="page">

  <!-- AUTH WALL -->
  <div class="auth-wall" id="authWall" style="display:none">
    <h2>Connexion requise 🔒</h2>
    <p>Connecte-toi pour voir ta collection.</p>
    <a href="index.html" class="btn btn-primary" style="font-size:1rem;padding:.85rem 2rem">Aller se connecter →</a>
  </div>

  <div id="mainContent" style="display:none">

    <div class="page-header">
      <div>
        <h1 class="page-title">Ma <span>Collection</span></h1>
        <p style="color:var(--muted)" id="collSubtitle">Chargement...</p>
      </div>
      <a href="boosters.html" class="btn btn-primary">📦 Ouvrir des boosters</a>
    </div>

    <!-- STATS -->
    <div class="stats-banner" id="statsBanner"></div>

    <!-- FILTERS -->
    <div class="filters">
      <div class="filter-group">
        <span class="filter-label">Série</span>
        <button class="filter-pill active" onclick="setFilter('series','all',this)">Toutes</button>
        <button class="filter-pill" onclick="setFilter('series','origins',this)">Origins</button>
        <button class="filter-pill" onclick="setFilter('series','campus',this)">Campus</button>
        <button class="filter-pill" onclick="setFilter('series','battle',this)">Battle</button>
        <button class="filter-pill" onclick="setFilter('series','stellar',this)">Stellar</button>
      </div>
      <div class="filter-sep"></div>
      <div class="filter-group">
        <span class="filter-label">Foil</span>
        <button class="filter-pill active" onclick="setFilter('foil','normal',this)">Sans Foil</button>
        <button class="filter-pill" onclick="setFilter('foil','foil',this)">✨ Foil</button>
        <button class="filter-pill" onclick="setFilter('foil','normal',this)">Normal</button>
      </div>
      <div class="filter-sep"></div>
      <input type="text" class="search-input" placeholder="🔍 Chercher une carte..." oninput="setSearch(this.value)">
    </div>

    <!-- SORT -->
    <div class="sort-row">
      <div style="display:flex;gap:.75rem;align-items:center;flex-wrap:wrap">
        <div class="sort-group">
          <span style="font-size:.8rem;color:var(--muted);font-weight:700">Tri :</span>
          <button class="sort-btn active" onclick="setSort('rarity',this)">Rareté</button>
          <button class="sort-btn" onclick="setSort('name',this)">Nom</button>
          <button class="sort-btn" onclick="setSort('series',this)">Série</button>
          <button class="sort-btn" onclick="setSort('date',this)">Date</button>
        </div>
        <div class="sort-group">
          <span style="font-size:.8rem;color:var(--muted);font-weight:700">Afficher :</span>
          <button class="sort-btn active" onclick="setOwned('all',this)">Toutes</button>
          <button class="sort-btn" onclick="setOwned('owned',this)">Possédées</button>
          <button class="sort-btn" onclick="setOwned('missing',this)">Manquantes</button>
        </div>
      </div>
      <div style="display:flex;gap:.75rem;align-items:center">
        <span class="results-count" id="resultsCount"></span>
        <div class="view-btns">
          <button class="view-btn active" onclick="setView('grid',this)" title="Grille">⊞</button>
          <button class="view-btn" onclick="setView('list',this)" title="Liste">☰</button>
        </div>
      </div>
    </div>

    <!-- LOADING -->
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <div>Chargement de ta collection...</div>
    </div>

    <!-- CARDS -->
    <div id="cardsContainer"></div>

  </div>
</div>

<script>
// ─── STATE ─────────────────────────────────────────────
let allCards = [];
let filters = { series:'all', foil:'normal', owned:'all', search:'', sort:'rarity' };
let viewMode = 'grid';

// ─── INIT ──────────────────────────────────────────────
window.addEventListener('load', async () => {
  updateNav();
  if (!isLoggedIn()) {
    document.getElementById('authWall').style.display = '';
    return;
  }
  document.getElementById('mainContent').style.display = '';
  await loadCollection();
});

function updateNav() {
  const user = getUser();
  const el = document.getElementById('navUser');
  if (user) {
    const name = user.user_metadata?.username || user.email;
    el.innerHTML = `<span>👤 ${name}</span><button class="btn btn-outline" onclick="logout()">Déco</button>`;
  }
}
function logout() { localStorage.clear(); window.location.href='index.html'; }

// ─── LOAD COLLECTION ──────────────────────────────────
async function loadCollection() {
  const user = getUser();
  document.getElementById('loadingState').style.display = '';
  document.getElementById('cardsContainer').innerHTML = '';

  // Construire d'abord toutes les cartes possibles (sans Supabase)
  const allPossible = [];
  for (const [sid, rarityGroups] of Object.entries(POOL)) {
    for (const [rarity, cardList] of Object.entries(rarityGroups)) {
      for (const card of cardList) {
        allPossible.push({ ...card, seriesId: sid, rarity, isFoil: false, key: card.id });
        allPossible.push({ ...card, seriesId: sid, rarity, isFoil: true, key: `${card.id}-foil` });
      }
    }
  }

  // Essayer de charger les cartes possédées depuis Supabase
  let owned = [];
  try {
    const result = await sbFetch(
      `user_cards?user_id=eq.${user.id}&order=obtained_at.desc`
    );
    // Si null = JWT expired, sbFetch a déjà redirigé
    if (result === null) return;
    owned = result || [];
  } catch(e) {
    console.warn('Impossible de charger depuis Supabase:', e.message);
    // On affiche quand même la collection vide (toutes les cartes comme non-possédées)
  }

  // Merge avec possédées
  allCards = allPossible.map(card => {
    const match = owned.find(o => o.card_id === card.key);
    return { ...card, owned: !!match, quantity: match?.quantity || 0, obtainedAt: match?.obtained_at };
  });

  renderStats(owned);
  renderCards();
  document.getElementById('loadingState').style.display = 'none';
}

// ─── STATS ────────────────────────────────────────────
function renderStats(owned) {
  const total = allCards.filter(c => !c.isFoil).length;
  const ownedCount = owned.length;
  const foilCount = owned.filter(o => o.card_id && o.card_id.endsWith('-foil')).length;
  const totalQty = owned.reduce((s,o) => s + (o.quantity||1), 0);
  const legendCount = owned.filter(o => o.rarity && o.rarity.startsWith('legendaire')).length;

  const user = getUser();
  document.getElementById('collSubtitle').textContent =
    `${user?.user_metadata?.username || 'Ta collection'} • ${ownedCount}/${total} cartes uniques`;

  document.getElementById('statsBanner').innerHTML = `
    <div class="stat-card">
      <div class="stat-card-num">${ownedCount}</div>
      <div class="stat-card-label">Cartes uniques</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-num">${totalQty}</div>
      <div class="stat-card-label">Total obtenues</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-num">${foilCount}</div>
      <div class="stat-card-label">Foils ✨</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-num">${legendCount}</div>
      <div class="stat-card-label">Légendaires 👑</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-num">${total > 0 ? Math.round(ownedCount/total*100) : 0}%</div>
      <div class="stat-card-label">Complétion</div>
    </div>
  `;
}

// ─── FILTERS ──────────────────────────────────────────
function setFilter(type, val, btn) {
  filters[type] = val;
  btn.closest('.filter-group').querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}
function setSort(val, btn) {
  filters.sort = val;
  document.querySelectorAll('.sort-btn').forEach(b => {
    if (['rarity','name','series','date'].includes(b.textContent.toLowerCase().trim()) ||
        b.onclick?.toString().includes(val)) {}
  });
  btn.closest('.sort-group').querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}
function setOwned(val, btn) {
  filters.owned = val;
  btn.closest('.sort-group').querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}
function setSearch(val) {
  filters.search = val.toLowerCase();
  renderCards();
}
function setView(mode, btn) {
  viewMode = mode;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

// ─── RENDER ────────────────────────────────────────────
const RARITY_ORDER = ['legendaire-or','legendaire-argent','legendaire-bronze','ultra-rare-holo2','ultra-rare-holo1','rare','peu-commune','commune','terrain'];

function renderCards() {
  let cards = [...allCards];

  // Filtres
  if (filters.series !== 'all') cards = cards.filter(c => c.seriesId === filters.series);
  if (filters.foil === 'foil') cards = cards.filter(c => c.isFoil);
  else if (filters.foil === 'normal') cards = cards.filter(c => !c.isFoil);
  // 'all' = toutes les cartes, foil et non-foil
  if (filters.owned === 'owned') cards = cards.filter(c => c.owned);
  if (filters.owned === 'missing') cards = cards.filter(c => !c.owned);
  if (filters.search) cards = cards.filter(c => c.name.toLowerCase().includes(filters.search));

  // Tri
  if (filters.sort === 'rarity') {
    cards.sort((a,b) => RARITY_ORDER.indexOf(a.rarity) - RARITY_ORDER.indexOf(b.rarity));
  } else if (filters.sort === 'name') {
    cards.sort((a,b) => a.name.localeCompare(b.name));
  } else if (filters.sort === 'series') {
    cards.sort((a,b) => a.seriesId.localeCompare(b.seriesId));
  } else if (filters.sort === 'date') {
    cards.sort((a,b) => {
      if (!a.obtainedAt && !b.obtainedAt) return 0;
      if (!a.obtainedAt) return 1;
      if (!b.obtainedAt) return -1;
      return new Date(b.obtainedAt) - new Date(a.obtainedAt);
    });
  }

  document.getElementById('resultsCount').textContent = `${cards.length} carte${cards.length>1?'s':''}`;

  const container = document.getElementById('cardsContainer');

  if (cards.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="emoji">🃏</div><h3>Aucune carte trouvée</h3><p>Modifie tes filtres ou ouvre des boosters !</p><br><a href="boosters.html" class="btn btn-primary" style="font-size:1rem">📦 Ouvrir des boosters</a></div>`;
    return;
  }

  // Grouper par rareté si tri = rareté
  if (filters.sort === 'rarity') {
    container.innerHTML = '';
    for (const rid of RARITY_ORDER) {
      const group = cards.filter(c => c.rarity === rid);
      if (group.length === 0) continue;
      const r = RARITIES[rid];
      const ownedInGroup = group.filter(c => c.owned).length;

      const header = document.createElement('div');
      header.className = 'rarity-header';
      header.innerHTML = `
        <div class="rarity-header-dot" style="background:${r.color}"></div>
        <div class="rarity-header-name" style="color:${r.color}">${r.label}</div>
        <div class="rarity-header-count">${ownedInGroup}/${group.length}</div>
        <div class="progress-bar-wrap"><div class="progress-bar" style="width:${group.length?ownedInGroup/group.length*100:0}%;background:${r.color}"></div></div>
      `;
      container.appendChild(header);

      const grid = document.createElement('div');
      grid.className = `cards-grid${viewMode === 'list' ? ' list-view' : ''}`;
      for (const card of group) {
        grid.appendChild(buildCard(card, RARITIES[card.rarity]));
      }
      container.appendChild(grid);
    }
  } else {
    container.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = `cards-grid${viewMode === 'list' ? ' list-view' : ''}`;
    for (const card of cards) {
      grid.appendChild(buildCard(card, RARITIES[card.rarity]));
    }
    container.appendChild(grid);
  }
}

function buildCard(card, r) {
  const s = SERIES.find(x => x.id === card.seriesId);
  const el = document.createElement('div');
  el.className = `coll-card${card.isFoil ? ' foil' : ''}${!card.owned ? ' missing' : ''}`;
  el.style.borderColor = card.owned ? (r?.color || '#333') : '#333';

  if (viewMode === 'list') {
    el.innerHTML = `
      <div>
        <div class="card-face" style="background:linear-gradient(135deg,${r?.color}22,${r?.color}44)">
          ${card.isFoil ? '<div class="foil-layer"></div>' : ''}
          ${card.owned && card.img
            ? `<img src="${card.img}" alt="${card.name}" style="width:100%;height:100%;object-fit:cover" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
            : ''}
          <span style="position:relative;z-index:1;${card.owned && card.img ? 'display:none' : ''}">${card.owned ? (card.emoji||'🃏') : '❓'}</span>
        </div>
        <div class="card-body">
          <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
            <span class="card-rarity-badge" style="background:${r?.color}22;color:${r?.color};border:1px solid ${r?.color}44">${r?.label}</span>
            ${card.isFoil ? '<span class="foil-tag2">✨ Foil</span>' : ''}
            ${!card.owned ? '<span style="font-size:.7rem;color:var(--muted);font-weight:700">NON POSSÉDÉE</span>' : ''}
          </div>
          <div class="card-name">${card.name}</div>
          <div class="card-meta">
            <span>${s?.name || card.seriesId}</span>
            ${card.owned && card.quantity > 1 ? `<span class="qty-badge">×${card.quantity}</span>` : ''}
          </div>
        </div>
      </div>
    `;
  } else {
    el.innerHTML = `
      <div class="card-face" style="background:linear-gradient(135deg,${r?.color}22,${r?.color}44)">
        ${card.isFoil ? '<div class="foil-layer"></div>' : ''}
        ${card.owned && card.img
          ? `<img src="${card.img}" alt="${card.name}" style="width:100%;height:100%;object-fit:cover" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
          : ''}
        <span style="position:relative;z-index:1;${card.owned && card.img ? 'display:none' : ''}">${card.owned ? (card.emoji||'🃏') : '❓'}</span>
      </div>
      <div class="card-body">
        <div class="card-rarity-badge" style="background:${r?.color}22;color:${r?.color};border:1px solid ${r?.color}44">${r?.label}</div>
        ${card.isFoil ? '<div class="foil-tag2">✨ Foil</div>' : ''}
        <div class="card-name">${card.owned ? card.name : '???'}</div>
        <div class="card-meta">
          <span>${s?.name || ''}</span>
          ${card.owned && card.quantity > 1 ? `<span class="qty-badge">×${card.quantity}</span>` : ''}
        </div>
      </div>
    `;
  }
  return el;
}
</script>
</body>
</html>
