<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WankulDEX — Boosters</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  :root{--red:#E8001D;--yellow:#FFD600;--dark:#0D0D0D;--dark2:#141414;--dark3:#1E1E1E;--card-bg:#1A1A1A;--text:#F5F5F5;--muted:#666;--border:#2A2A2A;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--dark);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;}

  /* NAV */
  nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px;background:rgba(13,13,13,.97);backdrop-filter:blur(12px);border-bottom:2px solid var(--red);}
  .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;color:var(--text);text-decoration:none;}
  .nav-logo span{color:var(--red);}
  .nav-links{display:flex;gap:.5rem;}
  .nav-links a{color:var(--muted);text-decoration:none;font-weight:700;font-size:.85rem;letter-spacing:1px;text-transform:uppercase;padding:.4rem .8rem;border-radius:6px;transition:all .2s;}
  .nav-links a:hover{color:var(--text);background:var(--dark3);}
  .nav-links a.active{color:var(--yellow);}
  .nav-user{display:flex;align-items:center;gap:.75rem;font-size:.85rem;font-weight:700;color:var(--muted);}
  .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.6rem 1.4rem;border-radius:10px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;transition:all .2s;text-decoration:none;border:none;}
  .btn-outline{background:transparent;border:2px solid var(--border);color:var(--text);}
  .btn-outline:hover{border-color:var(--yellow);color:var(--yellow);}
  .btn-primary{background:var(--red);color:white;}
  .btn-primary:hover{background:#c0001a;transform:translateY(-1px);}

  /* ══════════════════════════════
     ÉCRAN AUTH
  ══════════════════════════════ */
  #screenAuth{display:none;padding:10rem 2rem;text-align:center;}
  #screenAuth h2{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;margin-bottom:.75rem;}
  #screenAuth p{color:var(--muted);margin-bottom:1.5rem;}

  /* ══════════════════════════════
     ÉCRAN 1 : CHOIX SÉRIE
  ══════════════════════════════ */
  #screenSelect{min-height:100vh;padding:80px 2rem 4rem;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .sel-title{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;letter-spacing:3px;margin:2.5rem 0 .5rem;text-align:center;}
  .sel-title span{color:var(--red);}
  .sel-sub{color:var(--muted);margin-bottom:3rem;font-size:.9rem;}

  .series-grid{display:grid;grid-template-columns:repeat(2,260px);gap:1.5rem;margin:0 auto;place-items:center;}
  .serie-card{background:var(--card-bg);border:2px solid var(--border);border-radius:20px;overflow:hidden;cursor:pointer;transition:all .3s;position:relative;display:block;text-decoration:none;color:var(--text);}
  .serie-card:hover{transform:translateY(-6px);border-color:var(--sc);box-shadow:0 20px 50px rgba(0,0,0,.5);}
  .serie-img-wrap{height:220px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#0a0a0a;position:relative;}
  .serie-img-wrap img{height:100%;width:100%;object-fit:contain;transition:transform .3s;padding:1rem;}
  .serie-card:hover .serie-img-wrap img{transform:scale(1.07);}
  .serie-img-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--card-bg) 0%,transparent 50%);}
  .serie-fallback{font-family:'Bebas Neue',sans-serif;font-size:6rem;color:color-mix(in srgb,var(--sc) 40%,transparent);position:relative;z-index:1;}
  .serie-info{padding:1.25rem;}
  .serie-season{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:.2rem;}
  .serie-name{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:1px;color:var(--sc);line-height:1;margin-bottom:.5rem;}
  .serie-meta{display:flex;gap:.75rem;font-size:.78rem;color:var(--muted);font-weight:700;}
  .serie-dot{width:7px;height:7px;border-radius:50%;background:var(--sc);display:inline-block;margin-right:.3rem;}
  .serie-open-hint{position:absolute;bottom:0;left:0;right:0;background:color-mix(in srgb,var(--sc) 90%,black);color:white;text-align:center;padding:.6rem;font-weight:900;font-size:.85rem;letter-spacing:1px;transform:translateY(100%);transition:transform .25s;}
  .serie-card:hover .serie-open-hint{transform:translateY(0);}

  /* ══════════════════════════════
     ÉCRAN 2 : OUVERTURE
  ══════════════════════════════ */
  #screenOpen{
    display:none;
    min-height:100vh;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:80px 2rem 4rem;
    position:relative;
    overflow:hidden;
  }
  .open-bg{position:fixed;inset:0;z-index:0;transition:background 1s;}
  .open-glow{position:fixed;width:900px;height:900px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0;transition:background 1s;}

  /* Phase booster */
  #phaseBooster{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:2rem;}
  .booster-big-wrap{cursor:pointer;transition:transform .2s;position:relative;}
  .booster-big-wrap:hover{transform:scale(1.03) rotate(-1deg);}
  .booster-big-img{width:340px;height:476px;object-fit:contain;border-radius:0;box-shadow:none;display:block;}
  .booster-big-ph{width:340px;height:476px;border-radius:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:6rem;box-shadow:none;position:relative;overflow:hidden;background:transparent!important;}
  .booster-big-ph::after{display:none;}
  .bshine{position:absolute;inset:0;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.25) 50%,transparent 70%);animation:bsh 2.5s ease-in-out infinite;}
  @keyframes bsh{0%,100%{opacity:0;transform:translateX(-100%)}50%{opacity:1;transform:translateX(100%)}}
  .open-hint{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:rgba(255,255,255,.4);animation:bl 1.5s ease-in-out infinite;}
  @keyframes bl{0%,100%{opacity:.2}50%{opacity:.8}}
  .open-series-name{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--muted);}

  /* Phase carte */
  #phaseCard{
    position:relative;z-index:10;
    display:none;
    flex-direction:column;
    align-items:center;
    gap:1.75rem;
    width:100%;
  }

  /* La grande carte centrale */
  .big-card{
    width:min(85vw,360px);
    border-radius:16px;
    overflow:hidden;
    border:3px solid var(--border);
    box-shadow:0 30px 80px rgba(0,0,0,.7);
    cursor:pointer;
    transition:transform .15s;
    animation:cardAppear .4s cubic-bezier(.34,1.56,.64,1);
  }
  .big-card-label{
    padding:.5rem .85rem;
    display:flex;align-items:center;justify-content:space-between;
    background:rgba(0,0,0,.6);
    border-bottom:2px solid var(--label-color,#999);
  }
  .big-card-label-rarity{font-size:.72rem;font-weight:900;text-transform:uppercase;letter-spacing:2px;}
  .big-card-label-ref{font-size:.7rem;color:rgba(255,255,255,.5);}
  @keyframes cardAppear{
    from{opacity:0;transform:scale(.7) translateY(30px);}
    to{opacity:1;transform:scale(1) translateY(0);}
  }
  .big-card:hover{transform:translateY(-4px) scale(1.02);}
  .big-card:active{transform:scale(.98);}
  .big-card-face{height:min(70vw,430px);display:flex;align-items:center;justify-content:center;font-size:8rem;position:relative;overflow:hidden;}
  .big-card-face img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .big-card-face .fallback{position:relative;z-index:2;font-size:8rem;}
  .big-card-face .card-emoji{font-size:8rem;position:relative;z-index:2;}
  .card-overlay-name{position:absolute;bottom:0;left:0;right:0;z-index:3;padding:.75rem 1rem;background:linear-gradient(to top,rgba(0,0,0,.85),transparent);font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:1px;}
  .big-card-foil{position:absolute;inset:0;background:linear-gradient(105deg,transparent 20%,rgba(255,215,0,.25) 40%,rgba(255,100,200,.25) 50%,rgba(100,200,255,.25) 60%,transparent 80%);animation:foilS 1.5s ease-in-out infinite alternate;}
  @keyframes foilS{from{transform:translateX(-50%)}to{transform:translateX(50%)}}
  .big-card-body{display:none;}
  .big-card-rarity{font-size:.72rem;font-weight:900;text-transform:uppercase;letter-spacing:2px;margin-bottom:.35rem;}
  .big-card-name{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:1px;line-height:1;margin-bottom:.25rem;}
  .big-card-slot{font-size:.72rem;color:rgba(255,255,255,.4);}
  .foil-tag{display:inline-block;margin-left:.4rem;font-size:.65rem;font-weight:900;background:linear-gradient(90deg,#FFD700,#FF69B4,#00BFFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

  /* Remaining stack indicator */
  .stack-indicator{display:flex;gap:.35rem;align-items:center;}
  .stack-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .3s;}
  .stack-dot.done{background:var(--yellow);}
  .stack-dot.current{background:white;transform:scale(1.3);}

  .progress-txt{font-size:.85rem;color:var(--muted);letter-spacing:1px;}
  .click-hint-card{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:3px;color:rgba(255,255,255,.25);animation:bl 2s ease-in-out infinite;margin-top:-.5rem;}

  /* ══════════════════════════════
     ÉCRAN 3 : RÉCAP
  ══════════════════════════════ */
  #screenRecap{display:none;min-height:100vh;padding:80px 2rem 5rem;}
  .recap-top{text-align:center;padding:3rem 0 2.5rem;}
  .recap-title{font-family:'Bebas Neue',sans-serif;font-size:4rem;letter-spacing:3px;margin-bottom:.4rem;}
  .recap-title span{color:var(--yellow);}
  .recap-sub{color:var(--muted);font-size:.9rem;margin-bottom:2rem;}
  .recap-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:2.5rem;}

  .recap-stats{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:3rem;}
  .rstat{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:.875rem 1.5rem;text-align:center;min-width:90px;}
  .rstat-n{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;line-height:1;}
  .rstat-l{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:.2rem;}

  .recap-section{max-width:1200px;margin:0 auto 2.5rem;padding:0 0;}
  .rsec-label{display:flex;align-items:center;gap:.6rem;font-size:.73rem;font-weight:900;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);}
  .rsec-dot{width:9px;height:9px;border-radius:50%;}
  .rsec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.875rem;}

  .mcard{border-radius:12px;overflow:hidden;border:2px solid var(--border);transition:transform .2s;animation:fadeUp .35s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .mcard:hover{transform:translateY(-4px);}
  .mcard.foil{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);}
  .mface{height:110px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;position:relative;overflow:hidden;} .mface img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;} .mface .fallback{position:relative;z-index:1;}
  .mface img{width:100%;height:100%;object-fit:cover;display:block;}
  .mface .card-emoji{font-size:3.5rem;position:relative;z-index:1;}
  .mfoil{position:absolute;inset:0;background:linear-gradient(105deg,transparent 20%,rgba(255,215,0,.2) 40%,rgba(255,100,200,.2) 50%,rgba(100,200,255,.2) 60%,transparent 80%);animation:foilS 2s ease-in-out infinite alternate;}
  .mbody{padding:.65rem .75rem;background:var(--dark3);}
  .mbadge{display:inline-block;padding:.1rem .4rem;border-radius:4px;font-size:.6rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-bottom:.3rem;}
  .mname{font-weight:900;font-size:.82rem;line-height:1.2;}
  .mfoil-tag{font-size:.6rem;font-weight:900;background:linear-gradient(90deg,#FFD700,#FF69B4,#00BFFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

  /* TOAST */
  .toast{position:fixed;bottom:2rem;right:2rem;z-index:9999;background:var(--dark3);border:1px solid var(--border);border-left:4px solid #00cc66;border-radius:12px;padding:1rem 1.5rem;font-size:.875rem;font-weight:700;transform:translateX(220%);transition:transform .3s;max-width:300px;pointer-events:none;}
  .toast.hot{border-left-color:var(--yellow);}
  .toast.show{transform:translateX(0);}

  /* Transition entre cartes */
  .card-exit{animation:cardExit .3s ease forwards;}
  @keyframes cardExit{to{opacity:0;transform:translateX(80px) rotate(8deg) scale(.9);}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Wankul<span>DEX</span></a>
  <div class="nav-links">
    <a href="index.html">Accueil</a>
    <a href="boosters.html" class="active">Boosters</a>
    <a href="collection.html">Ma Collection</a>
  </div>
  <div class="nav-user" id="navUser"></div>
</nav>

<!-- AUTH -->
<div id="screenAuth">
  <div style="font-size:4rem;margin-bottom:1rem">🔒</div>
  <h2>Connexion requise</h2>
  <p>Connecte-toi pour ouvrir des boosters.</p>
  <a href="index.html" class="btn btn-primary" style="font-size:1rem;padding:.85rem 2rem">Se connecter →</a>
</div>

<!-- ══════ ÉCRAN 1 : SÉLECTION ══════ -->
<div id="screenSelect">
  <h1 class="sel-title">Choisis ta <span>Série</span></h1>
  <p class="sel-sub">Clique sur un booster pour l'ouvrir directement</p>
  <div class="series-grid" id="seriesGrid"></div>
</div>

<!-- ══════ ÉCRAN 2 : OUVERTURE ══════ -->
<div id="screenOpen">
  <div class="open-bg" id="openBg"></div>
  <div class="open-glow" id="openGlow"></div>

  <!-- Booster -->
  <div id="phaseBooster">
    <div class="booster-big-wrap" id="boosterWrap" onclick="clickBooster()">
      <img id="boosterImg" class="booster-big-img" src="" alt="" style="display:none">
      <div id="boosterPh" class="booster-big-ph">
        <div class="bshine"></div>
        <span id="boosterPhLbl" style="position:relative;z-index:1">?</span>
      </div>
    </div>
    <div class="open-hint">CLIQUE POUR OUVRIR</div>
    <div class="open-series-name" id="openSeriesName"></div>
  </div>

  <!-- Carte une par une -->
  <div id="phaseCard">
    <div id="bigCardWrap"></div>
    <div class="stack-indicator" id="stackIndicator"></div>
    <div class="progress-txt" id="progressTxt">Carte 1 / 10</div>
    <div class="click-hint-card" id="clickHintCard">CLIQUE POUR CONTINUER</div>
  </div>
</div>

<!-- ══════ ÉCRAN 3 : RÉCAP ══════ -->
<div id="screenRecap">
  <div class="recap-top">
    <div class="recap-title">Ton <span>Ouverture</span></div>
    <div class="recap-sub" id="recapSub"></div>
    <div class="recap-btns">
      <button class="btn btn-primary" onclick="openAnother()" style="font-size:1rem;padding:.85rem 2rem">📦 Ouvrir un autre booster</button>
      <button class="btn btn-outline" onclick="chooseSeries()" style="font-size:1rem;padding:.85rem 2rem">🔄 Changer de série</button>
      <a href="collection.html" class="btn btn-outline" style="font-size:1rem;padding:.85rem 2rem">📚 Ma Collection</a>
    </div>
    <div class="recap-stats" id="recapStats"></div>
  </div>
  <div id="recapSections"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
let selId = null;
let cards = [];
let idx = 0;
let clicking = false;

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
window.addEventListener('load', () => {
  updateNav();
  if (!isLoggedIn()) {
    show('screenAuth');
    return;
  }
  show('screenSelect');
  buildGrid();
});

function updateNav() {
  const u = getUser(), el = document.getElementById('navUser');
  if (u) {
    const n = u.user_metadata?.username || u.email;
    el.innerHTML = `<span>👤 ${n}</span><button class="btn btn-outline" onclick="logout()">Déco</button>`;
  } else el.innerHTML = `<a href="index.html" class="btn btn-primary">Connexion</a>`;
}
function logout() { localStorage.clear(); location.href = 'index.html'; }

function show(id) {
  ['screenAuth','screenSelect','screenOpen','screenRecap'].forEach(s => {
    const el = document.getElementById(s);
    el.style.display = (s === id) ? (s === 'screenOpen' ? 'flex' : 'block') : 'none';
  });
}

// ══════════════════════════════════════
//  ÉCRAN 1 : GRILLE SÉRIES
// ══════════════════════════════════════
function buildGrid() {
  const grid = document.getElementById('seriesGrid');
  grid.innerHTML = '';
  SERIES.forEach(s => {
    const el = document.createElement('div');
    el.className = 'serie-card';
    el.style.setProperty('--sc', s.color);
    el.innerHTML = `
      <div class="serie-img-wrap">
        <img src="${s.img}" alt="${s.name}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="serie-fallback" style="display:none">${s.name.slice(0,2).toUpperCase()}</div>
      </div>
      <div class="serie-info">
        <div class="serie-season">${s.season}</div>
        <div class="serie-name">${s.name}</div>
        <div class="serie-meta">
          <span><span class="serie-dot"></span>${s.cards} cartes</span>
          <span>📦 10 cartes / booster</span>
        </div>
      </div>
      <div class="serie-open-hint">📦 OUVRIR CE BOOSTER</div>
    `;
    el.onclick = () => goToOpen(s.id);
    grid.appendChild(el);
  });
}

// ══════════════════════════════════════
//  ÉCRAN 2 : SETUP OUVERTURE
// ══════════════════════════════════════
function goToOpen(id) {
  selId = id;
  const s = SERIES.find(x => x.id === id);

  // Tirage
  cards = drawBooster(id);
  idx = 0;
  clicking = false;

  // BG
  document.getElementById('openBg').style.background =
    `radial-gradient(ellipse at center, ${s.color}18 0%, var(--dark) 65%)`;
  document.getElementById('openGlow').style.background =
    `radial-gradient(circle, ${s.color}28, transparent 65%)`;

  // Image booster
  const img = document.getElementById('boosterImg');
  const ph  = document.getElementById('boosterPh');
  img.style.display = 'none'; ph.style.display = 'flex';
  img.src = s.img;
  img.onload = () => { img.style.display = 'block'; ph.style.display = 'none'; };
  img.onerror = () => {
    img.style.display = 'none'; ph.style.display = 'flex';
    ph.style.background = `linear-gradient(135deg,${s.color}55,${s.color}99)`;
    document.getElementById('boosterPhLbl').textContent = s.name.slice(0,2).toUpperCase();
  };

  document.getElementById('openSeriesName').textContent = `${s.season} — ${s.name}`;

  // Reset phases
  document.getElementById('phaseBooster').style.display = 'flex';
  document.getElementById('phaseCard').style.display = 'none';
  document.getElementById('bigCardWrap').innerHTML = '';

  show('screenOpen');
}

// ══════════════════════════════════════
//  CLICK SUR LE BOOSTER
// ══════════════════════════════════════
async function clickBooster() {
  const wrap = document.getElementById('boosterWrap');

  // Shake
  for (const tx of ['-12px','12px','-8px','8px','0']) {
    wrap.style.transform = `translateX(${tx}) scale(1.05)`;
    await sleep(70);
  }
  // Disparition
  wrap.style.transition = 'transform .4s ease, opacity .4s';
  wrap.style.transform = 'scale(0) rotate(20deg)';
  wrap.style.opacity = '0';

  await sleep(450);

  document.getElementById('phaseBooster').style.display = 'none';
  wrap.style.transform = '';
  wrap.style.opacity = '';
  wrap.style.transition = '';

  document.getElementById('phaseCard').style.display = 'flex';
  buildDots();
  showCard(0);
}

// ══════════════════════════════════════
//  AFFICHER UNE CARTE
// ══════════════════════════════════════
function showCard(i) {
  const card = cards[i];
  const r = RARITIES[card.slot] || R.commune;
  const wrap = document.getElementById('bigCardWrap');
  const isLast = (i === cards.length - 1);

  wrap.innerHTML = '';

  const el = document.createElement('div');
  el.className = 'big-card' + (card.isFoil ? '' : '');
  el.style.borderColor = r.color;
  el.style.boxShadow = `0 30px 80px ${r.color}44`;
  el.innerHTML = `
    <div class="big-card-label" style="--label-color:${r.color}">
      <span class="big-card-label-rarity" style="color:${r.color}">${r.label}${card.isFoil ? ' ✨ Foil' : ''}</span>
      <span class="big-card-label-ref">${card.ref||''}</span>
    </div>
    <div class="big-card-face" style="background:linear-gradient(135deg,${r.color}22,${r.color}44)">
      ${card.isFoil ? '<div class="big-card-foil"></div>' : ''}
      ${card.img ? `<img src="${card.img}" alt="${card.name}" loading="lazy" onerror="this.style.display='none'">` : `<span class="fallback">${card.emoji||'🃏'}</span>`}
      <div class="card-overlay-name">${card.name}</div>
    </div>
  `;

  // Click pour carte suivante
  if (!isLast) {
    el.onclick = () => advanceCard();
  } else {
    el.onclick = () => goToRecap();
    document.getElementById('clickHintCard').textContent = 'VOIR LE RÉCAP';
  }

  wrap.appendChild(el);

  // BG flash pour cartes spéciales
  const special = ['legendaire-or','legendaire-argent','legendaire-bronze','ultra-rare-holo2','ultra-rare-holo1'];
  if (special.includes(card.slot)) {
    flashBg(r.color);
    const msgs = {
      'legendaire-or':'🏆 LÉGENDAIRE OR !!!',
      'legendaire-argent':'🥈 Légendaire Argent !',
      'legendaire-bronze':'🥉 Légendaire Bronze !',
      'ultra-rare-holo2':'🌟 Ultra Rare Holo 2 !',
      'ultra-rare-holo1':'⭐ Ultra Rare Holo 1 !',
    };
    showToast(msgs[card.slot], true);
  }

  updateDots(i);
  document.getElementById('progressTxt').textContent = `Carte ${i+1} / ${cards.length}`;
  document.getElementById('clickHintCard').style.display = isLast ? 'block' : 'block';
  if (!isLast) document.getElementById('clickHintCard').textContent = 'CLIQUE POUR CONTINUER';
}

async function advanceCard() {
  if (clicking) return;
  clicking = true;

  const wrap = document.getElementById('bigCardWrap');
  const el = wrap.firstChild;
  if (el) {
    el.classList.add('card-exit');
    await sleep(280);
  }

  idx++;
  if (idx < cards.length) {
    showCard(idx);
  } else {
    goToRecap();
  }
  clicking = false;
}

// ══════════════════════════════════════
//  DOTS PROGRESSION
// ══════════════════════════════════════
function buildDots() {
  const container = document.getElementById('stackIndicator');
  container.innerHTML = '';
  cards.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'stack-dot';
    d.id = `dot-${i}`;
    container.appendChild(d);
  });
}

function updateDots(current) {
  cards.forEach((_, i) => {
    const d = document.getElementById(`dot-${i}`);
    if (!d) return;
    d.className = 'stack-dot' + (i < current ? ' done' : i === current ? ' current' : '');
  });
}

// ══════════════════════════════════════
//  RÉCAP
// ══════════════════════════════════════
async function goToRecap() {
  // Sauvegarde
  try {
    await saveCardsToCollection(cards.map(c => ({...c, rarity:c.slot, seriesId:selId})));
    await saveBoosterHistory(selId, cards);
    showToast('✅ Collection sauvegardée !');
  } catch(e) { console.warn(e); }

  show('screenRecap');
  window.scrollTo(0,0);

  const s = SERIES.find(x => x.id === selId);
  document.getElementById('recapSub').textContent = `${cards.length} cartes obtenues — ${s.season} ${s.name}`;

  // Stats
  const cnt = {};
  cards.forEach(c => { cnt[c.slot] = (cnt[c.slot]||0)+1; });
  const foils = cards.filter(c=>c.isFoil).length;
  const order = ['legendaire-or','legendaire-argent','legendaire-bronze','ultra-rare-holo2','ultra-rare-holo1','super-rare','rare','peu-commune','commune','terrain'];
  let statsHtml = '';
  for (const slot of order) {
    if (!cnt[slot]) continue;
    const r = RARITIES[slot];
    statsHtml += `<div class="rstat"><div class="rstat-n" style="color:${r.color}">${cnt[slot]}</div><div class="rstat-l">${r.label}</div></div>`;
  }
  if (foils) statsHtml += `<div class="rstat"><div class="rstat-n" style="color:#FFD700">${foils}</div><div class="rstat-l">Foil ✨</div></div>`;
  document.getElementById('recapStats').innerHTML = statsHtml;

  // Sections cartes
  const sections = [
    {label:'🔥 Gros Slot',       color:'#FFD600', slots:['legendaire-or','legendaire-argent','legendaire-bronze','ultra-rare-holo2','ultra-rare-holo1']},
    {label:'💜 Super Rares',     color:'#9B59B6', slots:['super-rare']},
    {label:'💙 Rare garantie',   color:'#2196F3', slots:['rare']},
    {label:'🟢 Peu Communes',    color:'#4CAF50', slots:['peu-commune']},
    {label:'⚪ Communes',        color:'#9E9E9E', slots:['commune']},
    {label:'🏔️ Terrain',        color:'#8D6E63', slots:['terrain']},
  ];

  const container = document.getElementById('recapSections');
  container.innerHTML = '';
  let delay = 0;

  for (const sec of sections) {
    const secCards = cards.filter(c => sec.slots.includes(c.slot));
    if (!secCards.length) continue;

    const secEl = document.createElement('div');
    secEl.className = 'recap-section';
    secEl.innerHTML = `<div class="rsec-label"><div class="rsec-dot" style="background:${sec.color}"></div>${sec.label} (${secCards.length})</div>`;
    const grid = document.createElement('div');
    grid.className = 'rsec-grid';

    for (const card of secCards) {
      const r = RARITIES[card.slot] || R.commune;
      const el = document.createElement('div');
      el.className = 'mcard' + (card.isFoil ? ' foil' : '');
      el.style.borderColor = r.color;
      el.style.animationDelay = `${delay}ms`;
      el.innerHTML = `
        <div class="mface" style="background:linear-gradient(135deg,${r.color}22,${r.color}44)">
          ${card.isFoil ? '<div class="mfoil"></div>' : ''}
          ${card.img
            ? `<img src="${card.img}" alt="${card.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" loading="lazy"><span class="card-emoji" style="display:none;position:absolute">${card.emoji||'🃏'}</span>`
            : `<span class="card-emoji" style="position:relative;z-index:1">${card.emoji||'🃏'}</span>`
          }
        </div>
        <div class="mbody">
          <div class="mbadge" style="background:${r.color}22;color:${r.color};border:1px solid ${r.color}44">${r.label}</div>
          ${card.isFoil ? '<div class="mfoil-tag">✨ Foil</div>' : ''}
          <div class="mname">${card.name}</div>
        </div>
      `;
      grid.appendChild(el);
      delay += 50;
    }
    secEl.appendChild(grid);
    container.appendChild(secEl);
  }
}

  goToOpen(selId);
}

function slotDesc(slot) {

    terrain:'🏔️ Terrain — 1ère carte',
    commune:'⚪ Commune',
    'peu-commune':'🟢 Peu Commune',
    rare:'💙 Rare garantie',
    'super-rare':'💜 Super Rare',
    'ultra-rare-holo1':'⭐ Ultra Rare Holo 1',
    'ultra-rare-holo2':'🌟 Ultra Rare Holo 2',
    'legendaire-bronze':'🥉 Légendaire Bronze',
    'legendaire-argent':'🥈 Légendaire Argent',

  }[slot] || slot;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function showToast(msg, hot=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (hot?' hot':'') + ' show';
  setTimeout(() => t.classList.remove('show'), 4000);
}

function flashBg(color) {
  const bg = document.getElementById('openBg');
  if (!bg) return;
  bg.style.background = `radial-gradient(ellipse at center, ${color}45 0%, var(--dark) 60%)`;
  setTimeout(() => {
    const s = SERIES.find(x => x.id === selId);
    if (s && bg) bg.style.background = `radial-gradient(ellipse at center, ${s.color}18 0%, var(--dark) 65%)`;
  }, 1800);
}
