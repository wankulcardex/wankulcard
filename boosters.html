<style>
  :root{--red:#E8001D;--yellow:#FFD600;--dark:#0D0D0D;--dark2:#141414;--dark3:#1E1E1E;--card-bg:#1A1A1A;--text:#F5F5F5;--muted:#888;--border:#2A2A2A;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--dark);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;}

  nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px;background:rgba(13,13,13,.97);backdrop-filter:blur(12px);border-bottom:2px solid var(--red);}
  .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;color:var(--text);text-decoration:none;}
  .nav-logo span{color:var(--red);}
  .nav-links{display:flex;gap:.5rem;}
  .nav-links a{color:var(--muted);text-decoration:none;font-weight:700;font-size:.85rem;letter-spacing:1px;text-transform:uppercase;padding:.4rem .8rem;border-radius:6px;transition:all .2s;}
  .nav-links a:hover{color:var(--text);background:var(--dark3);}
  .nav-links a.active{color:var(--yellow);}
  .nav-user{display:flex;align-items:center;gap:.75rem;font-size:.85rem;font-weight:700;color:var(--muted);}
  .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1.2rem;border-radius:8px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;cursor:pointer;transition:all .2s;text-decoration:none;border:none;}
  .btn-outline{background:transparent;border:2px solid var(--border);color:var(--text);}
  .btn-outline:hover{border-color:var(--yellow);color:var(--yellow);}
  .btn-primary{background:var(--red);color:white;}
  .btn-primary:hover{background:#c0001a;transform:translateY(-1px);}
  .btn-primary:disabled{background:#444;cursor:not-allowed;transform:none;}

  .page{padding:80px 0 4rem;}

  /* SERIES TABS */
  .series-bar{display:flex;gap:1rem;padding:1.25rem 2rem;overflow-x:auto;background:var(--dark2);border-bottom:1px solid var(--border);}
  .series-bar::-webkit-scrollbar{height:4px;}
  .series-bar::-webkit-scrollbar-thumb{background:var(--red);border-radius:2px;}
  .series-tab{flex-shrink:0;display:flex;align-items:center;gap:.6rem;padding:.6rem 1.4rem;border-radius:10px;border:2px solid var(--border);background:var(--card-bg);cursor:pointer;transition:all .25s;font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;color:var(--muted);}
  .series-tab:hover{color:var(--text);}
  .series-tab.active{color:white;border-color:var(--sc);background:color-mix(in srgb,var(--sc) 20%,var(--card-bg));}
  .sdot{width:10px;height:10px;border-radius:50%;background:var(--sc);}

  /* LAYOUT */
  .main{display:grid;grid-template-columns:400px 1fr;min-height:calc(100vh - 130px);}
  @media(max-width:900px){.main{grid-template-columns:1fr;}}

  /* BOOSTER PANEL */
  .booster-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem;background:var(--dark);position:sticky;top:64px;height:calc(100vh - 64px);overflow:hidden;}
  .panel-glow{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(232,0,29,.1),transparent 70%);pointer-events:none;transition:background .5s;}
  .booster-wrap{position:relative;cursor:pointer;transition:transform .3s;user-select:none;}
  .booster-wrap:hover{transform:scale(1.04) rotate(-1deg);}
  .booster-wrap:active{transform:scale(.96);}
  .booster-img{width:240px;height:336px;object-fit:contain;display:block;border-radius:14px;box-shadow:0 30px 80px rgba(0,0,0,.6);}
  .booster-placeholder{width:240px;height:336px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:5rem;letter-spacing:2px;color:rgba(255,255,255,.6);position:relative;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6);}
  .booster-placeholder::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 60%);}
  .shine{position:absolute;inset:0;border-radius:14px;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.2) 50%,transparent 70%);animation:shine 3s ease-in-out infinite;}
  @keyframes shine{0%,100%{opacity:0;transform:translateX(-100%)}50%{opacity:1;transform:translateX(100%)}}
  .hint{margin-top:1.25rem;font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;animation:blink 2s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
  .count-row{display:flex;gap:.5rem;margin-top:1.25rem;}
  .cnt-btn{background:var(--dark3);border:2px solid var(--border);color:var(--muted);border-radius:8px;padding:.45rem .95rem;font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;transition:all .2s;}
  .cnt-btn.active{background:var(--red);border-color:var(--red);color:white;}
  .open-btn{margin-top:1.25rem;font-size:1rem;padding:.85rem 0;width:260px;justify-content:center;}

  /* CARDS PANEL */
  .cards-panel{background:var(--dark2);border-left:1px solid var(--border);padding:2rem;overflow-y:auto;max-height:calc(100vh - 130px);}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;color:var(--muted);text-align:center;gap:.75rem;}
  .empty-state .e-emoji{font-size:4rem;}
  .panel-title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:1px;margin-bottom:1.25rem;}
  .panel-title span{color:var(--red);}

  /* STATS */
  .stats-row{display:flex;gap:.6rem;margin-bottom:1.5rem;flex-wrap:wrap;}
  .schip{background:var(--dark3);border:1px solid var(--border);border-radius:99px;padding:.3rem .8rem;font-size:.75rem;font-weight:700;display:flex;align-items:center;gap:.35rem;}
  .schip-dot{width:7px;height:7px;border-radius:50%;}

  /* SLOT SECTIONS */
  .slot-sec{margin-bottom:1.75rem;}
  .slot-label{display:flex;align-items:center;gap:.5rem;font-size:.72rem;font-weight:900;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:.75rem;padding-bottom:.4rem;border-bottom:1px solid var(--border);}
  .slot-ldot{width:8px;height:8px;border-radius:50%;}
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.75rem;}

  /* CARD */
  .wcard{border-radius:12px;overflow:hidden;border:2px solid var(--border);transition:all .3s;opacity:0;animation:cardPop .5s ease forwards;}
  @keyframes cardPop{0%{opacity:0;transform:scale(.6) rotateY(90deg) translateY(20px)}65%{transform:scale(1.05) rotateY(0deg) translateY(-4px)}100%{opacity:1;transform:scale(1) translateY(0)}}
  .wcard:hover{transform:translateY(-5px) scale(1.03);box-shadow:0 15px 40px rgba(0,0,0,.6);}
  .wcard.foil{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);}
  .wcard.big{grid-column:1/-1;}
  .wcard-face{height:110px;display:flex;align-items:center;justify-content:center;font-size:3rem;position:relative;overflow:hidden;}
  .wcard.big .wcard-face{height:150px;font-size:5rem;}
  .foil-fx{position:absolute;inset:0;background:linear-gradient(105deg,transparent 20%,rgba(255,215,0,.2) 40%,rgba(255,100,200,.2) 50%,rgba(100,200,255,.2) 60%,transparent 80%);animation:foilS 2s ease-in-out infinite alternate;}
  @keyframes foilS{from{transform:translateX(-40%)}to{transform:translateX(40%)}}
  .wcard-body{padding:.65rem .75rem;background:var(--dark3);}
  .wcard-badge{display:inline-block;padding:.12rem .45rem;border-radius:4px;font-size:.6rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;margin-bottom:.3rem;}
  .wcard-name{font-weight:900;font-size:.82rem;line-height:1.2;}
  .foil-label{font-size:.6rem;font-weight:900;background:linear-gradient(90deg,#FFD700,#FF69B4,#00BFFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

  /* OVERLAY ANIMATION */
  .overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;opacity:0;pointer-events:none;transition:opacity .3s;}
  .overlay.on{opacity:1;pointer-events:all;}
  .ov-txt{font-family:'Bebas Neue',sans-serif;font-size:5rem;letter-spacing:6px;color:var(--yellow);animation:ovPulse .5s ease-in-out infinite alternate;}
  @keyframes ovPulse{from{transform:scale(.92);text-shadow:0 0 20px rgba(255,214,0,.3)}to{transform:scale(1.08);text-shadow:0 0 60px rgba(255,214,0,.8)}}
  .ov-sub{font-size:.9rem;color:var(--muted);text-transform:uppercase;letter-spacing:3px;}

  /* TOAST */
  .toast{position:fixed;bottom:2rem;right:2rem;z-index:999;background:var(--dark3);border:1px solid var(--border);border-left:3px solid #00cc66;border-radius:12px;padding:1rem 1.5rem;font-size:.875rem;font-weight:700;transform:translateX(220%);transition:transform .35s;max-width:300px;}
  .toast.hot{border-left-color:var(--red);}
  .toast.on{transform:translateX(0);}

  .auth-wall{text-align:center;padding:6rem 2rem;max-width:480px;margin:0 auto;}
  .auth-wall h2{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;margin-bottom:.75rem;}
  .auth-wall p{color:var(--muted);margin-bottom:1.5rem;}
</style>

// ─── TIRAGE WANKUL OFFICIEL ───────────────────────
// Structure :
//  Carte 1   : Terrain
//  Cartes 2-5: Communes (4)
//  Cartes 6-7: Peu Communes (2)
//  Carte 8   : Rare garantie (peut upgrade)
//  Carte 9   : Gros slot 🔥
function drawBooster(sid) {
  const p = POOL[sid] || POOL.origins;
  const pick = arr => arr[Math.floor(Math.random()*arr.length)];
  const cards = [];

  // 1. Terrain
  cards.push({...pick(p.terrain), slot:'terrain', isFoil: Math.random()<0.05});

  // 2-5. Communes
  for(let i=0;i<4;i++)
    cards.push({...pick(p.commune), slot:'commune', isFoil: Math.random()<0.02});

  // 6-7. Peu Communes
  for(let i=0;i<2;i++)
    cards.push({...pick(p['peu-commune']), slot:'peu-commune', isFoil: Math.random()<0.04});

  // 8. Rare garantie (peut upgrade)
  const ru = Math.random();
  const rSlot = ru<0.02 ? 'super-rare' : ru<0.04 ? 'ultra-rare-holo1' : 'rare';
  cards.push({...pick(p[rSlot]||p.rare), slot:rSlot, isFoil: ru<0.01});

  // 9. Gros slot
  const b = Math.random();
  let bSlot;
  if      (b<0.01)  bSlot='legendaire-or';
  else if (b<0.025) bSlot='legendaire-argent';
  else if (b<0.05)  bSlot='legendaire-bronze';
  else if (b<0.12)  bSlot='ultra-rare-holo2';
  else if (b<0.22)  bSlot='ultra-rare-holo1';
  else if (b<0.40)  bSlot='super-rare';
  else              bSlot='rare';
  cards.push({...pick(p[bSlot]||p.rare), slot:bSlot, isFoil:b<0.05||Math.random()<0.1, isBig:true});

  return cards;
}

// ─── STATE ────────────────────────────────────────
let sel = null, count = 1, busy = false;

window.addEventListener('load',()=>{
  updateNav();
  if(!isLoggedIn()){document.getElementById('authWall').style.display='';return;}
  document.getElementById('mainContent').style.display='';
  buildTabs();
});

function updateNav(){
  const u=getUser(), el=document.getElementById('navUser');
  if(u){
    const n=u.user_metadata?.username||u.email;
    el.innerHTML=`<span>👤 ${n}</span><button class="btn btn-outline" onclick="logout()">Déco</button>`;
  } else el.innerHTML=`<a href="index.html" class="btn btn-primary">Connexion</a>`;
}
function logout(){localStorage.clear();location.href='index.html';}

function buildTabs(){
  const bar=document.getElementById('seriesBar');
  bar.innerHTML='';
  SERIES.forEach(s=>{
    const b=document.createElement('button');
    b.className='series-tab';
    b.style.setProperty('--sc',s.color);
    b.innerHTML=`<div class="sdot"></div>${s.season} — ${s.name}`;
    b.onclick=()=>selectSeries(s.id);
    bar.appendChild(b);
  });
}

function selectSeries(id){
  sel=id;
  const s=SERIES.find(x=>x.id===id);
  document.querySelectorAll('.series-tab').forEach((b,i)=>b.classList.toggle('active',SERIES[i].id===id));

  // Image
  const img=document.getElementById('bImg');
  const ph=document.getElementById('bPlaceholder');
  img.src=s.img;
  img.onload=()=>{img.style.display='block';ph.style.display='none';};
  img.onerror=()=>{
    img.style.display='none'; ph.style.display='flex';
    ph.style.background=`linear-gradient(135deg,${s.color}33,${s.color}77)`;
    document.getElementById('bLabel').textContent=s.name.slice(0,2).toUpperCase();
  };

  // Glow
  document.getElementById('panelGlow').style.background=`radial-gradient(circle,${s.color}20,transparent 70%)`;
  document.getElementById('boosterWrap').style.filter=`drop-shadow(0 25px 70px ${s.color}55)`;
  document.getElementById('hint').textContent='Clique pour ouvrir !';
  document.getElementById('openBtn').disabled=false;
  document.getElementById('emptyState').style.display='flex';
  document.getElementById('cardsResult').style.display='none';
}

function setCount(n,btn){
  count=n;
  document.querySelectorAll('.cnt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

async function triggerOpen(){
  if(!sel||busy) return;
  busy=true;
  document.getElementById('openBtn').disabled=true;

  const s=SERIES.find(x=>x.id===sel);

  // Overlay
  document.getElementById('ovTxt').textContent=s.name.toUpperCase();
  document.getElementById('ovSub').textContent=count>1?`Ouverture de ${count} boosters...`:'Ouverture en cours...';
  document.getElementById('overlay').classList.add('on');

  // Shake booster
  const w=document.getElementById('boosterWrap');
  w.style.transition='transform .15s';
  for(const [tx,ty,r] of [['-8px','0','3deg'],['8px','0','-3deg'],['0','-10px','0'],['0','0','0']]){
    w.style.transform=`translate(${tx},${ty}) rotate(${r}) scale(1.05)`;
    await sleep(120);
  }
  w.style.transform='';

  await sleep(700);
  document.getElementById('overlay').classList.remove('on');

  // Tirage
  const all=[];
  for(let i=0;i<count;i++) all.push(...drawBooster(sel));

  // Save
  try{
    await saveCardsToCollection(all.map(c=>({...c,rarity:c.slot,seriesId:sel})));
    await saveBoosterHistory(sel,all);
  }catch(e){console.warn(e);}

  renderCards(all,s);
  document.getElementById('openBtn').disabled=false;
  busy=false;
}

function renderCards(cards,s){
  document.getElementById('emptyState').style.display='none';
  const res=document.getElementById('cardsResult');
  res.style.display=''; res.innerHTML='';

  // Titre
  res.innerHTML+=`<div class="panel-title">${cards.length} cartes <span>${s.name}</span></div>`;

  // Stats
  const cnt={};
  cards.forEach(c=>{cnt[c.slot]=(cnt[c.slot]||0)+1;});
  const foils=cards.filter(c=>c.isFoil).length;
  let statsHtml='<div class="stats-row">';
  for(const [slot,n] of Object.entries(cnt)){
    const r=R[slot]; if(!r) continue;
    statsHtml+=`<div class="schip"><div class="schip-dot" style="background:${r.color}"></div>${r.label} ×${n}</div>`;
  }
  if(foils) statsHtml+=`<div class="schip">✨ Foil ×${foils}</div>`;
  statsHtml+='</div>';
  res.innerHTML+=statsHtml;

  // Sections dans l'ordre du booster
  const sections=[
    {label:'🏔️ Terrain',        color:R.terrain.color,           cards:cards.filter(c=>c.slot==='terrain')},
    {label:'⚪ Communes',        color:R.commune.color,           cards:cards.filter(c=>c.slot==='commune')},
    {label:'🟢 Peu Communes',    color:R['peu-commune'].color,    cards:cards.filter(c=>c.slot==='peu-commune')},
    {label:'💙 Rare garantie',   color:R.rare.color,              cards:cards.filter(c=>!c.isBig&&['rare','super-rare'].includes(c.slot))},
    {label:'🔥 Gros Slot',       color:'#FFD600',                 cards:cards.filter(c=>c.isBig)},
  ];

  let delay=0;
  for(const sec of sections){
    if(!sec.cards.length) continue;
    const secEl=document.createElement('div');
    secEl.className='slot-sec';
    secEl.innerHTML=`<div class="slot-label"><div class="slot-ldot" style="background:${sec.color}"></div>${sec.label}</div>`;
    const grid=document.createElement('div');
    grid.className='cards-grid';
    for(const card of sec.cards){
      grid.appendChild(makeCard(card,delay));
      delay+=90;
    }
    secEl.appendChild(grid);
    res.appendChild(secEl);
  }

  // Toast
  const hasLO=cards.some(c=>c.slot==='legendaire-or');
  const hasLA=cards.some(c=>c.slot==='legendaire-argent');
  const hasLB=cards.some(c=>c.slot==='legendaire-bronze');
  const hasUR=cards.some(c=>c.slot?.startsWith('ultra'));
  if(hasLO) toast('🏆 LÉGENDAIRE OR ! Incroyable !!',true);
  else if(hasLA) toast('🥈 Légendaire Argent !',true);
  else if(hasLB) toast('🥉 Légendaire Bronze !',true);
  else if(hasUR) toast('⭐ Ultra Rare obtenue !',true);
  else if(foils) toast('✨ Carte Foil !');
  else toast('✅ Cartes sauvegardées !');

  res.scrollIntoView({behavior:'smooth',block:'start'});
}

function makeCard(card,delay){
  const r=R[card.slot]||R.commune;
  const el=document.createElement('div');
  el.className='wcard'+(card.isFoil?' foil':'')+(card.isBig?' big':'');
  el.style.animationDelay=`${delay}ms`;
  el.style.borderColor=r.color;
  el.innerHTML=`
    <div class="wcard-face" style="background:linear-gradient(135deg,${r.color}22,${r.color}44)">
      ${card.isFoil?'<div class="foil-fx"></div>':''}
      <span style="position:relative;z-index:1">${card.emoji}</span>
    </div>
    <div class="wcard-body">
      <div class="wcard-badge" style="background:${r.color}22;color:${r.color};border:1px solid ${r.color}44">${r.label}</div>
      ${card.isFoil?'<div class="foil-label">✨ Foil</div>':''}
      <div class="wcard-name">${card.name}</div>
    </div>
  `;
  return el;
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function toast(msg,hot=false){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(hot?' hot':'')+' on';
  setTimeout(()=>t.classList.remove('on'),4000);
}
</script>
